<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CATHQ Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
    }
    nav {
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #222;
    }
    .detail-card {
      background: #0f0f0f;
      border: 1px solid #222;
      border-radius: 12px;
    }
    .player-wrapper {
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    h1, h2, p, span, div, label, select, a {
      color: #ffffff !important;
    }
    .cast-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    .cast-item {
      background: #111;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.95rem;
    }
    .error-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ff6b6b;
      font-size: 1.25rem;
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
<body class="min-h-screen">

  <nav class="fixed w-full top-0 z-50 py-4">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <a href="index.html" class="text-3xl md:text-4xl font-bold text-white">CATHQ</a>
      <a href="index.html" class="text-lg text-gray-300 hover:text-white transition">← Back</a>
    </div>
  </nav>

  <div class="pt-24 px-4 sm:px-6 lg:px-8 pb-12 max-w-7xl mx-auto">
    <div id="loading" class="text-center text-3xl font-bold text-white animate-pulse py-20">
      Loading...
    </div>

    <div id="detail" class="hidden detail-card p-6 md:p-10">
      <div class="flex flex-col md:flex-row gap-8 mb-10">
        <div class="md:w-1/3 lg:w-1/4">
          <img id="poster" class="w-full rounded-lg shadow-2xl object-cover" alt="Poster">
        </div>
        <div class="flex-1">
          <h1 id="title" class="text-3xl md:text-4xl font-bold mb-4 text-white"></h1>
          <p id="overview" class="text-gray-200 leading-relaxed"></p>

          <!-- Cast section -->
          <div class="mt-8">
            <h3 class="text-xl font-semibold mb-4 text-white">Cast</h3>
            <div id="castList" class="cast-list"></div>
          </div>
        </div>
      </div>

      <div id="tvSelectors" class="hidden mt-8">
        <h2 class="text-2xl font-semibold mb-6 text-white">Select Episode</h2>
        <div class="flex flex-wrap gap-6">
          <div class="min-w-[160px]">
            <label class="block mb-2 text-white">Season</label>
            <select id="seasonSelect" class="w-full bg-gray-900 border border-gray-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-gray-500">
            </select>
          </div>
          <div class="min-w-[200px]">
            <label class="block mb-2 text-white">Episode</label>
            <select id="episodeSelect" class="w-full bg-gray-900 border border-gray-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-gray-500">
            </select>
          </div>
        </div>
      </div>

      <div class="mt-10 player-wrapper relative">
        <div class="relative pt-[56.25%] bg-black">
          <iframe 
            id="playerFrame" 
            class="absolute inset-0 w-full h-full" 
            frameborder="0" 
            allowfullscreen 
            allow="encrypted-media"
            sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock"
          ></iframe>
        </div>
        <div id="playerError" class="error-overlay hidden">
          Media cannot be played right now.<br>
          The stream may be down or blocked by your ad-blocker.<br>
          Try disabling ad-blocker, using Brave browser, or come back later.
        </div>
      </div>
    </div>
  </div>

  <script>
    const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJiZjBlMTAxNjk0ZTE3YTBmMDFjYWFiMjRlNTMyODU2OCIsIm5iZiI6MTc3MjMyNTk3My4wNzEsInN1YiI6IjY5YTM4YzU1MGI2ZDViNjE5MmRlOGNiMSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.VKxm0WPWNAADTrKPvdpAtDfLov8x8uIT3uK7uExHq7w';
    const headers = { 'Authorization': `Bearer ${TMDB_TOKEN}`, 'accept': 'application/json' };

    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    const id = urlParams.get('id');

    if (!type || !id) {
      document.getElementById('loading').innerHTML = '<p class="text-red-500 text-2xl font-bold">Invalid link. Go back to home.</p>';
    } else {
      async function fetchTMDB(endpoint) {
        const res = await fetch(`https://api.themoviedb.org/3${endpoint}`, { headers });
        if (!res.ok) throw new Error(`TMDB ${res.status}`);
        return res.json();
      }

      async function loadDetail() {
        try {
          const data = await fetchTMDB(`/${type}/${id}?append_to_response=credits,season/1`);
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('detail').classList.remove('hidden');

          document.getElementById('title').textContent = data.title || data.name || 'Untitled';
          document.getElementById('overview').textContent = data.overview || 'No overview available.';
          document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w780' + (data.poster_path || data.backdrop_path || '');

          // Cast / Actors
          const castList = document.getElementById('castList');
          castList.innerHTML = '';
          if (data.credits?.cast?.length) {
            data.credits.cast.slice(0, 6).forEach(actor => {
              const div = document.createElement('div');
              div.className = 'cast-item';
              div.textContent = actor.name;
              castList.appendChild(div);
            });
          } else {
            castList.innerHTML = '<p class="text-gray-400">Cast info not available</p>';
          }

          loadPlayer(type === 'movie' ? null : 1, type === 'movie' ? null : 1);

          if (type === 'tv') {
            document.getElementById('tvSelectors').classList.remove('hidden');
            const seasonSelect = document.getElementById('seasonSelect');
            seasonSelect.innerHTML = '';
            (data.seasons || []).forEach(s => {
              if (s.season_number === 0) return;
              const opt = document.createElement('option');
              opt.value = s.season_number;
              opt.textContent = `Season ${s.season_number} (${s.episode_count || '?'} eps)`;
              seasonSelect.appendChild(opt);
            });

            seasonSelect.addEventListener('change', async (e) => {
              const seasonNum = e.target.value;
              const eps = await fetchTMDB(`/tv/${id}/season/${seasonNum}`);
              const epSelect = document.getElementById('episodeSelect');
              epSelect.innerHTML = '';
              (eps.episodes || []).forEach(ep => {
                const opt = document.createElement('option');
                opt.value = ep.episode_number;
                opt.textContent = `E${ep.episode_number} - ${ep.name || 'Episode ' + ep.episode_number}`;
                epSelect.appendChild(opt);
              });
              loadPlayer(seasonNum, epSelect.value || 1);
            });

            document.getElementById('episodeSelect').addEventListener('change', (e) => {
              loadPlayer(seasonSelect.value, e.target.value);
            });

            if (seasonSelect.options.length > 0) {
              seasonSelect.dispatchEvent(new Event('change'));
            }
          }
        } catch (err) {
          document.getElementById('loading').innerHTML = `<p class="text-red-500 text-2xl font-bold">Error loading: ${err.message}</p>`;
        }
      }

      function loadPlayer(season, episode) {
        const base = 'https://vidsrc-embed.su/embed';  // Current live domain
        let src = '';
        if (type === 'movie') {
          src = `${base}/movie?tmdb=${id}&autoplay=1`;  // No color param
        } else {
          src = `${base}/tv?tmdb=${id}&season=${season}&episode=${episode}&autoplay=1&autonext=1`;  // No color
        }

        const iframe = document.getElementById('playerFrame');
        iframe.src = src;

        // Show error if nothing loads after 10 seconds
        setTimeout(() => {
          if (iframe.contentDocument && iframe.contentDocument.body.innerHTML.trim() === '') {
            document.getElementById('playerError').classList.remove('hidden');
          }
        }, 10000);
      }

      // Progress saving & resume
      const PROGRESS_KEY = `cathq_progress_${type}_${id}`;
      let currentSeason = 1;
      let currentEpisode = 1;

      function saveProgress(time, duration) {
        if (time < 10 || duration < 60) return;
        const progress = {
          time: Math.floor(time),
          duration: Math.floor(duration),
          lastWatched: Date.now(),
          season: currentSeason,
          episode: currentEpisode
        };
        localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
      }

      function loadSavedProgress() {
        const saved = localStorage.getItem(PROGRESS_KEY);
        if (!saved) return null;
        return JSON.parse(saved);
      }

      window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'PLAYER_EVENT') {
          const { event: ev, currentTime, duration } = event.data.data || {};
          if (ev === 'timeupdate' && currentTime && duration) {
            saveProgress(currentTime, duration);
          }
        }
      });

      const saved = loadSavedProgress();
      if (saved) {
        if (type === 'movie' || (type === 'tv' && saved.season === currentSeason && saved.episode === currentEpisode)) {
          setTimeout(() => {
            const iframe = document.getElementById('playerFrame');
            if (iframe && iframe.contentWindow) {
              iframe.contentWindow.postMessage({ command: 'seek', time: saved.time }, '*');
            }
          }, 6000);
        }
      }

      loadDetail();
    }
  </script>
</body>
</html>
