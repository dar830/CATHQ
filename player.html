<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CATHQ Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #0a0a0f;
      color: #f1f1f1;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    .nav-blur {
      background: rgba(15,15,20,0.95);
      backdrop-filter: blur(12px);
    }
    #loading, #errorMsg {
      text-align: center;
      padding: 2rem;
      font-size: 1.25rem;
    }
    #errorMsg {
      color: #ef4444;
      background: rgba(239,68,68,0.1);
      border: 1px solid #ef4444;
      border-radius: 0.5rem;
    }
  </style>
</head>
<body>
  <nav class="nav-blur fixed w-full top-0 z-50 py-4">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <a href="index.html" class="text-3xl font-bold text-red-600">CATHQ</a>
      <a href="index.html" class="text-lg font-medium hover:text-red-400 transition">← Back to Home</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 pt-32 pb-20">
    <div id="loading" class="text-center text-3xl font-bold text-gray-300 animate-pulse">
      Loading player...
    </div>

    <div id="detail" class="hidden">
      <div class="flex flex-col md:flex-row gap-10 mb-10">
        <div class="md:w-80 flex-shrink-0">
          <img id="poster" class="w-full rounded-xl shadow-2xl" alt="Poster">
        </div>
        <div class="flex-1">
          <h1 id="title" class="text-4xl md:text-5xl font-bold mb-4"></h1>
          <p id="overview" class="text-lg text-gray-300 leading-relaxed"></p>
        </div>
      </div>

      <div id="tvSelectors" class="hidden mb-8">
        <h3 class="text-xl font-semibold mb-4">Choose Episode</h3>
        <div class="flex gap-6">
          <div>
            <label class="block text-sm mb-2">Season</label>
            <select id="seasonSelect" class="bg-gray-900 border border-gray-700 px-5 py-3 rounded-lg text-white"></select>
          </div>
          <div>
            <label class="block text-sm mb-2">Episode</label>
            <select id="episodeSelect" class="bg-gray-900 border border-gray-700 px-5 py-3 rounded-lg text-white"></select>
          </div>
        </div>
      </div>

      <div class="rounded-2xl overflow-hidden border border-gray-800 shadow-2xl">
        <div class="relative pt-[56.25%] bg-black">
          <iframe id="playerFrame" class="absolute inset-0 w-full h-full" 
                  frameborder="0" allowfullscreen allow="encrypted-media"></iframe>
        </div>
      </div>
    </div>

    <div id="errorMsg" class="hidden mt-8 text-center"></div>
  </div>

  <script>
    const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJiZjBlMTAxNjk0ZTE3YTBmMDFjYWFiMjRlNTMyODU2OCIsIm5iZiI6MTc3MjMyNTk3My4wNzEsInN1YiI6IjY5YTM4YzU1MGI2ZDViNjE5MmRlOGNiMSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.VKxm0WPWNAADTrKPvdpAtDfLov8x8uIT3uK7uExHq7w';
    const headers = { 'Authorization': `Bearer ${TMDB_TOKEN}`, 'accept': 'application/json' };

    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    const id = urlParams.get('id');
    const resume = urlParams.get('resume') === '1';

    let currentSeason = 1;
    let currentEpisode = 1;

    async function loadDetail() {
      if (!type || !id) {
        showError("Invalid link. Go back to home.");
        return;
      }

      try {
        const data = await fetch(`https://api.themoviedb.org/3/${type}/${id}`, { headers }).then(r => r.json());

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('detail').classList.remove('hidden');

        document.getElementById('title').textContent = data.title || data.name || 'Untitled';
        document.getElementById('overview').textContent = data.overview || 'No overview available.';
        document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w780' + (data.poster_path || data.backdrop_path || '');

        // Save basic info for history
        const PROGRESS_KEY = `cathq_progress_${type}_${id}`;
        const existing = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
        localStorage.setItem(PROGRESS_KEY, JSON.stringify({
          ...existing,
          title: data.title || data.name,
          poster_path: data.poster_path || ''
        }));

        if (type === 'tv') {
          document.getElementById('tvSelectors').classList.remove('hidden');
          setupTVSelectors(data);
        }

        loadPlayer();

        // Resume if requested
        if (resume) {
          const saved = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
          if (saved.time > 30) {
            setTimeout(() => {
              const iframe = document.getElementById('playerFrame');
              if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({ command: 'seek', time: saved.time }, '*');
              }
            }, 8000);
          }
        }
      } catch (err) {
        showError("Failed to load details. Please try again later.");
        console.error(err);
      }
    }

    function setupTVSelectors(data) {
      const seasonSelect = document.getElementById('seasonSelect');
      seasonSelect.innerHTML = '';
      for (let i = 1; i <= (data.number_of_seasons || 5); i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `Season ${i}`;
        seasonSelect.appendChild(opt);
      }
      seasonSelect.onchange = () => {
        currentSeason = parseInt(seasonSelect.value);
        loadPlayer();
      };

      const episodeSelect = document.getElementById('episodeSelect');
      episodeSelect.innerHTML = '';
      for (let i = 1; i <= 20; i++) {   // You can increase this
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `Episode ${i}`;
        episodeSelect.appendChild(opt);
      }
      episodeSelect.onchange = () => {
        currentEpisode = parseInt(episodeSelect.value);
        loadPlayer();
      };
    }

    function loadPlayer() {
      const base = 'https://www.2embed.ru';   // More reliable embed
      let src = '';

      if (type === 'movie') {
        src = `${base}/embed/tmdb/movie?id=${id}`;
      } else {
        src = `${base}/embed/tmdb/tv?id=${id}&s=${currentSeason}&e=${currentEpisode}`;
      }

      document.getElementById('playerFrame').src = src;
    }

    function showError(message) {
      document.getElementById('loading').classList.add('hidden');
      const errorEl = document.getElementById('errorMsg');
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
    }

    // Save progress (including season/episode for TV)
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'PLAYER_EVENT') {
        const { event: ev, currentTime, duration } = event.data.data || {};
        if (ev === 'timeupdate' && currentTime && duration) {
          const PROGRESS_KEY = `cathq_progress_${type}_${id}`;
          localStorage.setItem(PROGRESS_KEY, JSON.stringify({
            time: Math.floor(currentTime),
            duration: Math.floor(duration),
            season: currentSeason,
            episode: currentEpisode,
            lastWatched: Date.now()
          }));
        }
      }
    });

    // Start loading
    loadDetail();
  </script>
</body>
</html>
