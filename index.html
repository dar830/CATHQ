<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CATHQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #0a0a0f;
      color: #e5e7eb;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    nav {
      background: #0f0f14;
      border-bottom: 1px solid #1f2937;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 0.5rem;
      overflow: hidden;
      transition: all 0.15s ease;
      position: relative;
    }
    .card:hover {
      transform: scale(1.04);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
    }
    .progress-bar-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: rgba(0,0,0,0.7);
      z-index: 10;
    }
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 6px;
      background: #e11d48; /* Netflix red */
    }
    .episode-info {
      position: absolute;
      bottom: 6px;
      left: 8px;
      font-size: 10px;
      color: #fff;
      font-weight: 600;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
      z-index: 15;
    }
    .heart {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 1.5rem;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 20;
    }
    .heart.favorited {
      color: #f472b6;
    }
    .modal {
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(6px);
    }
    .pagination button {
      background: #1f2937;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      margin: 0 0.25rem;
      transition: background 0.2s;
    }
    .pagination button:hover:not(:disabled) {
      background: #374151;
    }
    .pagination .active {
      background: #3b82f6;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="fixed w-full top-0 z-50 py-4">
    <div class="max-w-6xl mx-auto px-6 flex items-center justify-between">
      <h1 class="text-3xl font-bold text-white">CATHQ</h1>
      <div class="hidden md:flex items-center space-x-8 text-base">
        <button onclick="showSection('home')" class="hover:text-gray-300 transition">Home</button>
        <button onclick="showSection('movies')" class="hover:text-gray-300 transition">Movies</button>
        <button onclick="showSection('tv')" class="hover:text-gray-300 transition">TV Shows</button>
      </div>
      <div class="relative">
        <button id="menuBtn" class="text-2xl text-gray-300 hover:text-white transition">☰</button>
        <div id="dropdownMenu" class="hidden absolute right-0 mt-3 w-52 bg-gray-900 border border-gray-700 rounded-lg shadow-lg z-50">
          <div class="py-2">
            <button onclick="showSection('home'); toggleDropdown()" class="block w-full text-left px-6 py-3 hover:bg-gray-800 transition">Home</button>
            <button onclick="showSection('movies'); toggleDropdown()" class="block w-full text-left px-6 py-3 hover:bg-gray-800 transition">Movies</button>
            <button onclick="showSection('tv'); toggleDropdown()" class="block w-full text-left px-6 py-3 hover:bg-gray-800 transition">TV Shows</button>
            <hr class="border-gray-700 my-1">
            <button onclick="showSection('history'); toggleDropdown()" class="block w-full text-left px-6 py-3 hover:bg-gray-800 transition">History</button>
            <button onclick="showSection('favorites'); toggleDropdown()" class="block w-full text-left px-6 py-3 hover:bg-gray-800 transition">Favorites</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Search bar -->
  <div class="pt-20 pb-6 px-6 max-w-6xl mx-auto">
    <input id="searchInput" type="text" placeholder="Search movies or TV shows..." class="w-full bg-gray-900 border border-gray-700 text-white px-5 py-3 rounded-lg focus:outline-none focus:border-gray-500">
  </div>

  <!-- Search tabs -->
  <div id="searchTabs" class="hidden px-6 max-w-6xl mx-auto mb-6 flex gap-6">
    <button onclick="showSearchTab('movie')" class="px-5 py-2 bg-gray-800 rounded-lg hover:bg-gray-700 transition">Movies</button>
    <button onclick="showSearchTab('tv')" class="px-5 py-2 bg-gray-800 rounded-lg hover:bg-gray-700 transition">TV Shows</button>
  </div>

  <!-- Search Results -->
  <section id="searchSection" class="px-6 pb-16 hidden">
    <div class="flex flex-col items-center mb-6">
      <h2 class="text-2xl font-semibold mb-4">Search Results</h2>
      <div id="pagination" class="pagination flex items-center justify-center gap-2"></div>
    </div>
    <div id="searchGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"></div>
  </section>

  <!-- Home -->
  <section id="homeSection" class="pt-8 pb-16 px-6">
    <div class="text-center mb-12">
      <h2 class="text-5xl font-bold mb-3">CATHQ</h2>
      <p class="text-lg text-gray-400">Free movies and shows. No account needed.</p>
    </div>
    <h3 class="text-2xl font-semibold mb-6 text-center">Popular Movies</h3>
    <div id="homeMoviesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-12"></div>
    <h3 class="text-2xl font-semibold mb-6 text-center">Popular TV Shows</h3>
    <div id="homeTvGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-12"></div>
  </section>

  <!-- Movies -->
  <section id="moviesSection" class="px-6 pb-16 hidden">
    <h2 class="text-3xl font-bold mb-8 text-center">Movies</h2>
    <div id="moviesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
  </section>

  <!-- TV Shows -->
  <section id="tvSection" class="px-6 pb-16 hidden">
    <h2 class="text-3xl font-bold mb-8 text-center">TV Shows</h2>
    <div id="tvGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
  </section>

  <!-- History -->
  <section id="historySection" class="px-6 pb-16 hidden">
    <h2 class="text-3xl font-bold mb-8 text-center">Watch History</h2>
    <div id="historyGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    <p id="noHistory" class="text-center text-gray-400 mt-12 hidden">No history yet.</p>
  </section>

  <!-- Favorites -->
  <section id="favoritesSection" class="px-6 pb-16 hidden">
    <h2 class="text-3xl font-bold mb-8 text-center">Favorites</h2>
    <div id="favoritesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    <p id="noFavorites" class="text-center text-gray-400 mt-12 hidden">No favorites yet.</p>
  </section>

  <!-- Info Modal -->
  <div id="infoModal" class="fixed inset-0 modal-bg flex items-center justify-center z-[9999] hidden">
    <div class="relative w-full max-w-3xl mx-4 bg-gray-900 rounded-lg overflow-hidden border border-gray-700">
      <button onclick="closeModal()" class="absolute top-3 right-4 text-3xl text-gray-400 hover:text-white">×</button>
      <div class="flex flex-col md:flex-row">
        <div class="md:w-2/5">
          <img id="modalPoster" class="w-full h-full object-cover" alt="Poster">
        </div>
        <div class="p-6 flex-1">
          <h2 id="modalTitle" class="text-2xl font-bold mb-3 text-white"></h2>
          <div class="flex flex-wrap gap-3 mb-5 text-sm">
            <span id="modalRating" class="bg-yellow-600 text-black px-2 py-0.5 rounded font-medium"></span>
            <span id="modalYear" class="text-gray-400"></span>
            <span id="modalRuntime" class="text-gray-400"></span>
          </div>
          <p id="modalOverview" class="text-gray-300 mb-6"></p>
          <button id="playBtn" class="bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-3 rounded transition">
            ▶ Play
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Section toggle
    function showSection(id) {
      document.querySelectorAll('section[id$="Section"]').forEach(s => s.classList.add('hidden'));
      document.getElementById(id + 'Section').classList.remove('hidden');
      if (id === 'history') loadHistory();
      if (id === 'favorites') loadFavorites();
      if (id === 'movies') loadMovies();
      if (id === 'tv') loadTV();
    }

    document.getElementById('menuBtn').addEventListener('click', () => {
      document.getElementById('dropdownMenu').classList.toggle('hidden');
    });

    function toggleDropdown() {
      document.getElementById('dropdownMenu').classList.add('hidden');
    }

    showSection('home');

    const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJiZjBlMTAxNjk0ZTE3YTBmMDFjYWFiMjRlNTMyODU2OCIsIm5iZiI6MTc3MjMyNTk3My4wNzEsInN1YiI6IjY5YTM4YzU1MGI2ZDViNjE5MmRlOGNiMSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.VKxm0WPWNAADTrKPvdpAtDfLov8x8uIT3uK7uExHq7w';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMG_URL = 'https://image.tmdb.org/t/p/w500';
    const headers = { 'Authorization': `Bearer ${TMDB_TOKEN}`, 'accept': 'application/json' };

    const homeMoviesGrid = document.getElementById('homeMoviesGrid');
    const homeTvGrid = document.getElementById('homeTvGrid');
    const moviesGrid = document.getElementById('moviesGrid');
    const tvGrid = document.getElementById('tvGrid');
    const historyGrid = document.getElementById('historyGrid');
    const favoritesGrid = document.getElementById('favoritesGrid');
    const noHistory = document.getElementById('noHistory');
    const noFavorites = document.getElementById('noFavorites');

    async function fetchTMDB(endpoint) {
      try {
        const res = await fetch(`${BASE_URL}${endpoint}`, { headers });
        if (!res.ok) return { results: [] };
        return res.json();
      } catch (err) {
        console.error('TMDB error:', err);
        return { results: [] };
      }
    }

    // Updated createCard with Season/Episode label for TV shows
    function createCard(item, mediaType = item.media_type || 'movie') {
      const card = document.createElement('div');
      card.className = 'card relative group cursor-pointer';

      const PROGRESS_KEY = `cathq_progress_${mediaType}_${item.id}`;
      const saved = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
      const progressPercent = saved.duration ? Math.min(Math.floor((saved.time / saved.duration) * 100), 98) : 0;

      let extraHTML = '';
      if (mediaType === 'tv' && saved.season && saved.episode) {
        extraHTML = `<div class="episode-info">S${saved.season} E${saved.episode}</div>`;
      }

      card.innerHTML = `
        <div class="relative">
          <img src="${IMG_URL + (item.poster_path || '')}" alt="${item.title || item.name}" class="w-full aspect-[2/3] object-cover">
          ${progressPercent > 5 ? `
            <div class="progress-bar-container">
              ${extraHTML}
              <div class="progress-bar" style="width: ${progressPercent}%"></div>
            </div>
          ` : ''}
          <div class="heart ${isFavorite(item.id, mediaType) ? 'favorited' : ''}" 
               onclick="event.stopPropagation(); toggleFavorite(${item.id}, '${mediaType}', '${(item.title || item.name).replace(/'/g, "\\'")}', '${item.poster_path || ''}')">♥</div>
          <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/80 to-transparent">
            <p class="text-base font-medium truncate">${item.title || item.name}</p>
            <p class="text-xs text-gray-400 mt-1">${mediaType.toUpperCase()}</p>
          </div>
        </div>
      `;

      card.onclick = () => {
        if (progressPercent > 5) {
          window.location.href = `player.html?type=${mediaType}&id=${item.id}&resume=1`;
        } else {
          openModal(item, mediaType);
        }
      };

      return card;
    }

    // Modal, Favorites, History, Load functions (unchanged except using new createCard)
    const modal = document.getElementById('infoModal');
    async function openModal(item, mediaType) {
      try {
        const full = await fetchTMDB(`/${mediaType}/${item.id}?append_to_response=credits`);
        document.getElementById('modalTitle').textContent = full.title || full.name || 'Untitled';
        document.getElementById('modalOverview').textContent = full.overview || 'No description.';
        document.getElementById('modalPoster').src = 'https://image.tmdb.org/t/p/w780' + (full.poster_path || '');
        document.getElementById('modalRating').textContent = full.vote_average ? full.vote_average.toFixed(1) : '—';
        document.getElementById('modalYear').textContent = (full.release_date || full.first_air_date || '').slice(0,4) || '—';
        document.getElementById('modalRuntime').textContent = full.runtime ? full.runtime + ' min' : (full.number_of_seasons ? full.number_of_seasons + ' Seasons' : '—');
        document.getElementById('playBtn').onclick = () => {
          window.location.href = `player.html?type=${mediaType}&id=${item.id}`;
        };
        modal.classList.remove('hidden');
      } catch (err) {
        console.error('Modal error:', err);
      }
    }

    function closeModal() {
      modal.classList.add('hidden');
    }
    modal.onclick = e => {
      if (e.target === modal) closeModal();
    };

    function getFavorites() {
      return JSON.parse(localStorage.getItem('cathq_favorites') || '[]');
    }
    function isFavorite(id, type) {
      return getFavorites().some(f => f.id === id && f.type === type);
    }
    function toggleFavorite(id, type, title, poster_path) {
      let favs = getFavorites();
      const idx = favs.findIndex(f => f.id === id && f.type === type);
      const heart = event.target;
      heart.classList.add('pop');
      setTimeout(() => heart.classList.remove('pop'), 400);
      if (idx > -1) {
        favs.splice(idx, 1);
        heart.classList.remove('favorited');
      } else {
        favs.push({ id, type, title, poster_path });
        heart.classList.add('favorited');
      }
      localStorage.setItem('cathq_favorites', JSON.stringify(favs));
      if (!document.getElementById('favoritesSection').classList.contains('hidden')) loadFavorites();
    }

    function loadFavorites() {
      const grid = document.getElementById('favoritesGrid');
      grid.innerHTML = '';
      document.getElementById('noFavorites').classList.add('hidden');
      const favs = getFavorites();
      if (favs.length === 0) {
        document.getElementById('noFavorites').classList.remove('hidden');
        return;
      }
      favs.forEach(f => grid.appendChild(createCard({id:f.id, title:f.title, poster_path:f.poster_path}, f.type)));
    }

    function loadHistory() {
      const grid = document.getElementById('historyGrid');
      grid.innerHTML = '';
      document.getElementById('noHistory').classList.add('hidden');
      const keys = Object.keys(localStorage).filter(k => k.startsWith('cathq_progress_'));
      if (keys.length === 0) {
        document.getElementById('noHistory').classList.remove('hidden');
        return;
      }
      keys.forEach(key => {
        const data = JSON.parse(localStorage.getItem(key) || '{}');
        if (!data.title) return;
        const [, , type, id] = key.split('_');
        const card = createCard({id: Number(id), title: data.title, poster_path: data.poster_path || '', media_type: type}, type);
        grid.appendChild(card);
      });
    }

    async function loadHome() {
      const movies = await fetchTMDB('/movie/popular?page=1');
      homeMoviesGrid.innerHTML = '';
      if (movies.results?.length) {
        movies.results.slice(0,12).forEach(m => homeMoviesGrid.appendChild(createCard(m, 'movie')));
      }
      const tv = await fetchTMDB('/tv/popular?page=1');
      homeTvGrid.innerHTML = '';
      if (tv.results?.length) {
        tv.results.slice(0,12).forEach(s => homeTvGrid.appendChild(createCard(s, 'tv')));
      }
    }

    async function loadMovies() {
      const movies = await fetchTMDB('/movie/popular?page=1');
      moviesGrid.innerHTML = '';
      if (movies.results?.length) {
        movies.results.slice(0,18).forEach(m => moviesGrid.appendChild(createCard(m, 'movie')));
      }
    }

    async function loadTV() {
      const tv = await fetchTMDB('/tv/popular?page=1');
      tvGrid.innerHTML = '';
      if (tv.results?.length) {
        tv.results.slice(0,18).forEach(s => tvGrid.appendChild(createCard(s, 'tv')));
      }
    }

    // Fixed Search (case-insensitive + better filtering)
    const searchInput = document.getElementById('searchInput');
    const searchSection = document.getElementById('searchSection');
    const searchGrid = document.getElementById('searchGrid');
    const pagination = document.getElementById('pagination');
    const searchTabs = document.getElementById('searchTabs');
    let currentSearchResults = [];
    let currentPage = 1;
    const itemsPerPage = 6;
    let currentMediaType = 'movie';

    searchInput.addEventListener('input', async (e) => {
      const query = e.target.value.trim().toLowerCase();
      if (query.length < 2) {
        searchSection.classList.add('hidden');
        showSection('home');
        return;
      }

      showSection('searchSection');
      searchTabs.classList.remove('hidden');
      searchGrid.innerHTML = '<p class="col-span-full text-center text-gray-400">Searching...</p>';

      try {
        const { results } = await fetchTMDB(`/search/multi?query=${encodeURIComponent(query)}&page=1`);
        currentSearchResults = results
          .filter(r => (r.media_type === 'movie' || r.media_type === 'tv') && r.poster_path)
          .filter(r => (r.title || r.name || '').toLowerCase().includes(query)); // case-insensitive

        currentPage = 1;
        renderSearchResults();
      } catch (err) {
        searchGrid.innerHTML = '<p class="col-span-full text-center text-red-400">Error searching. Try again.</p>';
      }
    });

    function renderSearchResults() {
      searchGrid.innerHTML = '';
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = currentSearchResults.slice(start, end)
        .filter(item => item.media_type === currentMediaType);

      if (pageItems.length === 0) {
        searchGrid.innerHTML = '<p class="col-span-full text-center text-gray-400">No results found.</p>';
      } else {
        pageItems.forEach(item => {
          searchGrid.appendChild(createCard(item, item.media_type));
        });
      }
      renderPagination();
    }

    function renderPagination() {
      pagination.innerHTML = '';
      const totalPages = Math.ceil(currentSearchResults.filter(r => r.media_type === currentMediaType).length / itemsPerPage);
      if (totalPages <= 1) return;

      const prev = document.createElement('button');
      prev.textContent = '←';
      prev.disabled = currentPage === 1;
      prev.onclick = () => { currentPage--; renderSearchResults(); };
      pagination.appendChild(prev);

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = i === currentPage ? 'active' : '';
        btn.onclick = () => { currentPage = i; renderSearchResults(); };
        pagination.appendChild(btn);
      }

      const next = document.createElement('button');
      next.textContent = '→';
      next.disabled = currentPage === totalPages;
      next.onclick = () => { currentPage++; renderSearchResults(); };
      pagination.appendChild(next);
    }

    function showSearchTab(mediaType) {
      currentMediaType = mediaType;
      currentPage = 1;
      renderSearchResults();
    }

    // Initial load
    loadHome();
  </script>
</body>
</html>
